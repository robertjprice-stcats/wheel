function getContrastColor(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return (0.299 * r + 0.587 * g + 0.114 * b) / 255 > 0.5 ? "#1A0A0A" : "#FFFFFF";
}

function playTick() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 1200;
    gain.gain.value = 0.08;
    osc.start();
    osc.stop(ctx.currentTime + 0.03);
  } catch (e) {}
}

function playWinSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [523, 659, 784, 1047].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = freq;
      gain.gain.value = 0.1;
      osc.start(ctx.currentTime + i * 0.1);
      osc.stop(ctx.currentTime + i * 0.1 + 0.12);
    });
  } catch (e) {}
}

const SPIN_DURATION = 2800; // ms

function NamePicker() {
  const [names, setNames] = useState([]);
  const [inputVal, setInputVal] = useState("");
  const [spinning, setSpinning] = useState(false);
  const [winner, setWinner] = useState(null);
  const [rotation, setRotation] = useState(0);
  const [showConfetti, setShowConfetti] = useState(false);
  const [showOverlay, setShowOverlay] = useState(false);
  const [history, setHistory] = useState([]);
  const [removeAfterPick, setRemoveAfterPick] = useState(false);
  const [showBulk, setShowBulk] = useState(false);
  const [bulkVal, setBulkVal] = useState("");
  const [savedLists, setSavedLists] = useState([]); // [{name, names:[]}]
  const [listName, setListName] = useState("");
  const [importMsg, setImportMsg] = useState("");
  const canvasRef = useRef(null);
  const spinningRef = useRef(false);
  const inputRef = useRef(null);
  const fileInputRef = useRef(null);

  const addName = useCallback(() => {
    const trimmed = inputVal.trim();
    if (trimmed && !names.includes(trimmed)) {
      setNames(prev => [...prev, trimmed]);
      setInputVal("");
    }
  }, [inputVal, names]);

  const addBulk = () => {
    const newNames = bulkVal
      .split(/[\n\r,;\t]+/)
      .map(n => n.trim())
      .filter(n => n.length > 0 && n.length <= 20);
    const unique = [...new Set([...names, ...newNames])];
    setNames(unique);
    setBulkVal("");
    setShowBulk(false);
  };

  const removeName = (idx) => setNames(prev => prev.filter((_, i) => i !== idx));

  const clearAll = () => {
    setNames([]);
    setWinner(null);
    setHistory([]);
    setRotation(0);
    setShowOverlay(false);
  };

  // Save current names as a named list (held in memory until exported)
  const saveCurrentList = () => {
    const trimmed = listName.trim();
    if (!trimmed || names.length === 0) return;
    setSavedLists(prev => {
      const without = prev.filter(l => l.name !== trimmed);
      return [...without, { name: trimmed, names: [...names] }].sort((a, b) =>
        a.name.localeCompare(b.name)
      );
    });
    setListName("");
  };

  const loadList = (list) => {
    setNames([...list.names]);
    setWinner(null);
    setHistory([]);
    setRotation(0);
    setShowOverlay(false);
  };

  const deleteList = (name) => {
    setSavedLists(prev => prev.filter(l => l.name !== name));
  };

  // Export all saved lists to a file on the user's device
  const exportLists = () => {
    const data = {
      app: "St Catherine's Name Picker",
      version: 1,
      exported: new Date().toISOString(),
      lists: savedLists,
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], {
      type: "application/json",
    });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "class-lists.json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  // Import lists from a file
  const importLists = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        const incoming = Array.isArray(data) ? data : data.lists;
        if (!Array.isArray(incoming)) throw new Error("No lists found");
        const cleaned = incoming
          .filter(l => l && typeof l.name === "string" && Array.isArray(l.names))
          .map(l => ({
            name: l.name.slice(0, 40),
            names: l.names
              .filter(n => typeof n === "string" && n.trim())
              .map(n => n.trim().slice(0, 20)),
          }));
        setSavedLists(prev => {
          const merged = [...prev];
          cleaned.forEach(l => {
            const i = merged.findIndex(m => m.name === l.name);
            if (i >= 0) merged[i] = l;
            else merged.push(l);
          });
          return merged.sort((a, b) => a.name.localeCompare(b.name));
        });
        setImportMsg(`Loaded ${cleaned.length} list${cleaned.length !== 1 ? "s" : ""}.`);
      } catch (err) {
        setImportMsg("Could not read that file. Make sure it's a class-lists file from this tool.");
      }
      setTimeout(() => setImportMsg(""), 4000);
    };
    reader.readAsText(file);
    e.target.value = ""; // allow re-importing same file
  };

  // Draw wheel
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas || names.length === 0) return;
    const ctx = canvas.getContext("2d");
    const size = canvas.width;
    const center = size / 2;
    const radius = center - 8;
    const n = names.length;
    const arc = (2 * Math.PI) / n;

    ctx.clearRect(0, 0, size, size);

    ctx.save();
    ctx.shadowColor = "rgba(0,0,0,0.22)";
    ctx.shadowBlur = 16;
    ctx.beginPath();
    ctx.arc(center, center, radius, 0, 2 * Math.PI);
    ctx.fillStyle = COLORS.cream;
    ctx.fill();
    ctx.restore();

    names.forEach((name, i) => {
      const start = i * arc - Math.PI / 2;
      const end = start + arc;
      const color = WHEEL_COLORS[i % WHEEL_COLORS.length];

      ctx.beginPath();
      ctx.moveTo(center, center);
      ctx.arc(center, center, radius, start, end);
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();
      ctx.strokeStyle = "rgba(255,255,255,0.35)";
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.save();
      ctx.translate(center, center);
      ctx.rotate(start + arc / 2);
      ctx.textAlign = "right";
      ctx.fillStyle = getContrastColor(color);
      const fontSize = Math.max(10, Math.min(16, 200 / n));
      ctx.font = `bold ${fontSize}px Georgia, serif`;
      const display = name.length > 12 ? name.slice(0, 11) + "…" : name;
      ctx.fillText(display, radius - 16, fontSize / 3);
      ctx.restore();
    });

    // Outer gold ring
    ctx.beginPath();
    ctx.arc(center, center, radius, 0, 2 * Math.PI);
    ctx.strokeStyle = COLORS.gold;
    ctx.lineWidth = 4;
    ctx.stroke();

    // Peg markers
    names.forEach((_, i) => {
      const angle = i * arc - Math.PI / 2;
      const px = center + (radius - 2) * Math.cos(angle);
      const py = center + (radius - 2) * Math.sin(angle);
      ctx.beginPath();
      ctx.arc(px, py, 4, 0, 2 * Math.PI);
      ctx.fillStyle = COLORS.gold;
      ctx.fill();
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 1;
      ctx.stroke();
    });

    // Center hub with logo
    const hubRadius = 34;
    ctx.beginPath();
    ctx.arc(center, center, hubRadius + 2, 0, 2 * Math.PI);
    ctx.fillStyle = "#fff";
    ctx.fill();
    ctx.strokeStyle = COLORS.gold;
    ctx.lineWidth = 3;
    ctx.stroke();

    if (logoImage.complete && logoImage.naturalWidth > 0) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(center, center, hubRadius - 1, 0, 2 * Math.PI);
      ctx.clip();
      const s = hubRadius * 2;
      ctx.drawImage(logoImage, center - hubRadius, center - hubRadius, s, s);
      ctx.restore();
    } else {
      logoImage.onload = () => {
        ctx.save();
        ctx.beginPath();
        ctx.arc(center, center, hubRadius - 1, 0, 2 * Math.PI);
        ctx.clip();
        const s = hubRadius * 2;
        ctx.drawImage(logoImage, center - hubRadius, center - hubRadius, s, s);
        ctx.restore();
      };
    }
  }, [names]);

  // Tick sounds during spin
  useEffect(() => {
    if (spinning) {
      let count = 0;
      const id = setInterval(() => {
        playTick();
        count++;
        if (count > 35) clearInterval(id);
      }, 60 + count * 3);
      return () => clearInterval(id);
    }
  }, [spinning]);

  // Keyboard shortcut: Space to spin
  useEffect(() => {
    const handler = (e) => {
      // Don't trigger if typing in an input/textarea
      if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
      if (e.code === "Space" || e.key === " ") {
        e.preventDefault();
        if (!spinningRef.current && names.length >= 2) {
          spinWheel();
        }
      }
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [names, rotation]);

  const spinWheel = () => {
    if (spinningRef.current || names.length < 2) return;
    setSpinning(true);
    spinningRef.current = true;
    setWinner(null);
    setShowConfetti(false);
    setShowOverlay(false);

    const n = names.length;
    const winnerIdx = Math.floor(Math.random() * n);
    const arc = 360 / n;
    const segmentCenter = winnerIdx * arc + arc / 2;
    const fullSpins = 4 + Math.floor(Math.random() * 3);
    const targetRotation = fullSpins * 360 + (360 - segmentCenter);
    const newRotation = rotation + targetRotation;
    setRotation(newRotation);

    setTimeout(() => {
      const picked = names[winnerIdx];
      setWinner(picked);
      setHistory(prev => [picked, ...prev].slice(0, 20));
      setSpinning(false);
      spinningRef.current = false;
      setShowConfetti(true);
      setShowOverlay(true);
      playWinSound();
      if (removeAfterPick) {
        setNames(prev => prev.filter((_, i) => i !== winnerIdx));
      }
      setTimeout(() => setShowConfetti(false), 3500);
    }, SPIN_DURATION + 200);
  };

  const wheelSize = "min(380px, 85vw)";

  return (
    <div style={{
      minHeight: "100vh",
      background: `linear-gradient(160deg, ${COLORS.cream} 0%, ${COLORS.lightRose} 50%, #f8f0e8 100%)`,
      fontFamily: "Georgia, 'Liberation Serif', serif",
      padding: "16px 12px",
    }}>
      {/* Header */}
      <div style={{ textAlign: "center", marginBottom: 18 }}>
        <img src={LOGO_SRC} alt="St Catherine's" style={{ height: 50, marginBottom: 6 }} />
        <h1 style={{ color: COLORS.maroon, fontSize: 26, margin: 0, fontWeight: "bold", letterSpacing: 0.5 }}>
          Random Name Picker
        </h1>
        <p style={{
          color: COLORS.midMaroon, fontFamily: "Calibri, 'Liberation Sans', sans-serif",
          fontSize: 13, margin: "4px 0 0", fontStyle: "italic",
        }}>
          GDPR compliant &middot; Press <kbd style={{
            background: "#fff", border: `1px solid ${COLORS.midMaroon}`,
            borderRadius: 3, padding: "1px 6px", fontSize: 11,
            fontFamily: "Calibri, sans-serif",
          }}>Space</kbd> to spin
        </p>
      </div>

      <div style={{
        maxWidth: 920, margin: "0 auto",
        display: "flex", flexWrap: "wrap", gap: 20, justifyContent: "center",
      }}>
        {/* Left panel */}
        <div style={{ flex: "1 1 270px", maxWidth: 340 }}>
          <div style={{
            background: "#fff", borderRadius: 12, padding: 18,
            border: `2px solid ${COLORS.gold}`,
            boxShadow: "0 4px 16px rgba(122,10,10,0.07)",
          }}>
            <h2 style={{
              color: COLORS.stCatsBlue, fontSize: 15, margin: "0 0 10px",
              borderBottom: `2px solid ${COLORS.gold}`, paddingBottom: 7,
            }}>Add Students</h2>

            <div style={{ display: "flex", gap: 6, marginBottom: 8 }}>
              <input ref={inputRef} type="text" value={inputVal}
                onChange={e => setInputVal(e.target.value)}
                onKeyDown={e => e.key === "Enter" && addName()}
                placeholder="First name…" maxLength={20}
                style={{
                  flex: 1, padding: "9px 10px", borderRadius: 8,
                  border: `1.5px solid ${COLORS.midMaroon}`,
                  fontFamily: "Calibri, sans-serif", fontSize: 14, outline: "none",
                }}
              />
              <button onClick={addName} style={{
                background: COLORS.maroon, color: "#fff", border: "none", borderRadius: 8,
                padding: "9px 14px", fontWeight: "bold", cursor: "pointer",
                fontFamily: "Georgia, serif", fontSize: 14,
              }}>Add</button>
            </div>

            <button onClick={() => setShowBulk(!showBulk)} style={{
              background: "none", border: "none", color: COLORS.stCatsBlue,
              cursor: "pointer", fontSize: 12, fontFamily: "Calibri, sans-serif",
              textDecoration: "underline", marginBottom: 6, padding: 0,
            }}>
              {showBulk ? "Hide bulk add" : "Paste a class list / CSV"}
            </button>

            {showBulk && (
              <div style={{ marginBottom: 8 }}>
                <textarea value={bulkVal} onChange={e => setBulkVal(e.target.value)}
                  placeholder="Paste names (comma-separated, one per line, or from a spreadsheet column)…"
                  rows={4} style={{
                    width: "100%", padding: 8, borderRadius: 8,
                    border: `1.5px solid ${COLORS.midMaroon}`, resize: "vertical",
                    fontFamily: "Calibri, sans-serif", fontSize: 13, outline: "none",
                    boxSizing: "border-box",
                  }}
                />
                <button onClick={addBulk} style={{
                  background: COLORS.stCatsBlue, color: "#fff", border: "none", borderRadius: 6,
                  padding: "6px 14px", cursor: "pointer", fontSize: 12, marginTop: 4,
                  fontFamily: "Calibri, sans-serif",
                }}>Add all</button>
              </div>
            )}

            <div style={{
              background: COLORS.cream, borderRadius: 8, padding: 6,
              minHeight: 50, maxHeight: 200, overflowY: "auto",
            }}>
              {names.length === 0 && (
                <p style={{
                  color: COLORS.midMaroon, fontFamily: "Calibri, sans-serif",
                  fontSize: 13, textAlign: "center", margin: 10,
                }}>Add at least 2 names to spin the wheel.</p>
              )}
              {names.map((name, i) => (
                <div key={i} style={{
                  display: "flex", alignItems: "center", justifyContent: "space-between",
                  padding: "4px 8px", marginBottom: 2,
                  background: i % 2 === 0 ? "#fff" : COLORS.lightRose,
                  borderRadius: 6, fontFamily: "Calibri, sans-serif", fontSize: 13,
                }}>
                  <span>
                    <span style={{
                      display: "inline-block", width: 10, height: 10, borderRadius: "50%",
                      background: WHEEL_COLORS[i % WHEEL_COLORS.length], marginRight: 7,
                      verticalAlign: "middle",
                    }} />
                    {name}
                  </span>
                  <button onClick={() => removeName(i)} style={{
                    background: "none", border: "none", color: COLORS.midMaroon,
                    cursor: "pointer", fontSize: 17, lineHeight: 1, padding: "0 3px",
                  }} title="Remove">&times;</button>
                </div>
              ))}
            </div>

            <div style={{
              display: "flex", justifyContent: "space-between", alignItems: "center",
              marginTop: 8, fontFamily: "Calibri, sans-serif", fontSize: 12, color: COLORS.midMaroon,
            }}>
              <span>{names.length} name{names.length !== 1 ? "s" : ""}</span>
              {names.length > 0 && (
                <button onClick={clearAll} style={{
                  background: "none", border: "none", color: COLORS.stCatsRed,
                  cursor: "pointer", fontSize: 12, textDecoration: "underline",
                }}>Clear all</button>
              )}
            </div>

            <label style={{
              display: "flex", alignItems: "center", gap: 6, marginTop: 10,
              fontFamily: "Calibri, sans-serif", fontSize: 12, color: COLORS.dark, cursor: "pointer",
            }}>
              <input type="checkbox" checked={removeAfterPick}
                onChange={e => setRemoveAfterPick(e.target.checked)}
                style={{ accentColor: COLORS.maroon }}
              />
              Remove name after picking (no repeats)
            </label>
          </div>

          {/* History */}
          {history.length > 0 && (
            <div style={{
              background: "#fff", borderRadius: 12, padding: 14, marginTop: 14,
              border: `2px solid ${COLORS.gold}`,
              boxShadow: "0 4px 16px rgba(122,10,10,0.07)",
            }}>
              <h3 style={{
                color: COLORS.stCatsBlue, fontSize: 13, margin: "0 0 6px",
                borderBottom: `1px solid ${COLORS.gold}`, paddingBottom: 5,
              }}>Previously Selected</h3>
              <div style={{ fontFamily: "Calibri, sans-serif", fontSize: 12, color: COLORS.dark }}>
                {history.map((h, i) => (
                  <div key={i} style={{ padding: "2px 0" }}>{i + 1}. {h}</div>
                ))}
              </div>
            </div>
          )}

          {/* Saved class lists */}
          <div style={{
            background: "#fff", borderRadius: 12, padding: 16, marginTop: 14,
            border: `2px solid ${COLORS.gold}`,
            boxShadow: "0 4px 16px rgba(122,10,10,0.07)",
          }}>
            <h3 style={{
              color: COLORS.stCatsBlue, fontSize: 14, margin: "0 0 8px",
              borderBottom: `2px solid ${COLORS.gold}`, paddingBottom: 6,
            }}>My Class Lists</h3>

            {/* Save current */}
            <div style={{ display: "flex", gap: 6, marginBottom: 8 }}>
              <input type="text" value={listName}
                onChange={e => setListName(e.target.value)}
                onKeyDown={e => e.key === "Enter" && saveCurrentList()}
                placeholder="Name this list (e.g. 9X1)" maxLength={40}
                style={{
                  flex: 1, padding: "8px 10px", borderRadius: 8,
                  border: `1.5px solid ${COLORS.midMaroon}`,
                  fontFamily: "Calibri, sans-serif", fontSize: 13, outline: "none",
                }}
              />
              <button onClick={saveCurrentList}
                disabled={!listName.trim() || names.length === 0}
                style={{
                  background: (!listName.trim() || names.length === 0)
                    ? COLORS.midMaroon : COLORS.maroon,
                  color: "#fff", border: "none", borderRadius: 8,
                  padding: "8px 12px", fontWeight: "bold",
                  cursor: (!listName.trim() || names.length === 0) ? "not-allowed" : "pointer",
                  fontFamily: "Georgia, serif", fontSize: 13,
                  opacity: (!listName.trim() || names.length === 0) ? 0.5 : 1,
                }}>Save</button>
            </div>

            {/* List of saved lists */}
            {savedLists.length === 0 ? (
              <p style={{
                color: COLORS.midMaroon, fontFamily: "Calibri, sans-serif",
                fontSize: 12, margin: "6px 0", fontStyle: "italic",
              }}>
                No lists yet. Build a list above, name it, and Save. Then Export to keep it on your device.
              </p>
            ) : (
              <div style={{ marginBottom: 8 }}>
                {savedLists.map((list) => (
                  <div key={list.name} style={{
                    display: "flex", alignItems: "center", justifyContent: "space-between",
                    padding: "6px 8px", marginBottom: 3,
                    background: COLORS.lightRose, borderRadius: 6,
                    fontFamily: "Calibri, sans-serif", fontSize: 13,
                  }}>
                    <span style={{ flex: 1, minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                      <strong>{list.name}</strong>
                      <span style={{ color: COLORS.midMaroon }}> · {list.names.length}</span>
                    </span>
                    <button onClick={() => loadList(list)} style={{
                      background: COLORS.stCatsBlue, color: "#fff", border: "none",
                      borderRadius: 5, padding: "3px 10px", cursor: "pointer",
                      fontSize: 12, marginLeft: 6, fontFamily: "Calibri, sans-serif",
                    }}>Load</button>
                    <button onClick={() => deleteList(list.name)} style={{
                      background: "none", border: "none", color: COLORS.midMaroon,
                      cursor: "pointer", fontSize: 16, lineHeight: 1, padding: "0 4px", marginLeft: 2,
                    }} title="Delete">×</button>
                  </div>
                ))}
              </div>
            )}

            {/* Export / Import */}
            <div style={{ display: "flex", gap: 6, marginTop: 4 }}>
              <button onClick={exportLists} disabled={savedLists.length === 0}
                style={{
                  flex: 1, background: savedLists.length === 0 ? COLORS.midMaroon : COLORS.gold,
                  color: savedLists.length === 0 ? "#fff" : COLORS.dark, border: "none",
                  borderRadius: 8, padding: "8px 10px", cursor: savedLists.length === 0 ? "not-allowed" : "pointer",
                  fontWeight: "bold", fontSize: 12, fontFamily: "Calibri, sans-serif",
                  opacity: savedLists.length === 0 ? 0.5 : 1,
                }}>↓ Export to file</button>
              <button onClick={() => fileInputRef.current?.click()}
                style={{
                  flex: 1, background: "#fff", color: COLORS.maroon,
                  border: `1.5px solid ${COLORS.maroon}`, borderRadius: 8,
                  padding: "8px 10px", cursor: "pointer", fontWeight: "bold",
                  fontSize: 12, fontFamily: "Calibri, sans-serif",
                }}>↑ Import file</button>
              <input ref={fileInputRef} type="file" accept=".json,application/json"
                onChange={importLists} style={{ display: "none" }} />
            </div>

            {importMsg && (
              <p style={{
                color: COLORS.stCatsBlue, fontFamily: "Calibri, sans-serif",
                fontSize: 12, margin: "8px 0 0",
              }}>{importMsg}</p>
            )}

            <p style={{
              color: COLORS.midMaroon, fontFamily: "Calibri, sans-serif",
              fontSize: 11, margin: "8px 0 0", fontStyle: "italic",
            }}>
              Saved lists live on this page only. Export them to a file to reuse next time — the file stays on your device.
            </p>
          </div>
        </div>
        <div style={{
          flex: "1 1 340px", maxWidth: 480,
          display: "flex", flexDirection: "column", alignItems: "center",
        }}>
          {/* Pointer */}
          <div style={{
            width: 0, height: 0,
            borderLeft: "14px solid transparent", borderRight: "14px solid transparent",
            borderTop: `26px solid ${COLORS.maroon}`,
            filter: "drop-shadow(0 2px 4px rgba(0,0,0,0.3))",
            zIndex: 10, marginBottom: -4,
          }} />

          {/* Wheel + overlay container */}
          <div style={{ position: "relative", width: wheelSize, height: wheelSize }}>
            {names.length >= 2 ? (
              <div style={{
                width: "100%", height: "100%",
                transition: spinning
                  ? `transform ${SPIN_DURATION / 1000}s cubic-bezier(0.15, 0.65, 0.08, 0.98)`
                  : "none",
                transform: `rotate(${rotation}deg)`,
                transformOrigin: "center center",
              }}>
                <canvas ref={canvasRef} width={380} height={380}
                  style={{ width: "100%", height: "100%" }} />
              </div>
            ) : (
              <div style={{
                width: "100%", height: "100%", borderRadius: "50%",
                background: `linear-gradient(135deg, ${COLORS.lightRose}, ${COLORS.cream})`,
                border: `3px dashed ${COLORS.gold}`,
                display: "flex", alignItems: "center", justifyContent: "center",
                flexDirection: "column", color: COLORS.midMaroon,
                fontFamily: "Calibri, sans-serif", textAlign: "center", padding: 40,
              }}>
                <div style={{ fontSize: 44, marginBottom: 8 }}>🎡</div>
                <div style={{ fontSize: 15 }}>Add at least 2 names to see the wheel</div>
              </div>
            )}

            {/* Confetti */}
            {showConfetti && (
              <div style={{
                position: "absolute", top: 0, left: 0,
                width: "100%", height: "100%", pointerEvents: "none", overflow: "hidden",
              }}>
                {Array.from({ length: 50 }).map((_, i) => (
                  <div key={i} style={{
                    position: "absolute",
                    left: `${Math.random() * 100}%`, top: "-10%",
                    width: `${5 + Math.random() * 8}px`,
                    height: `${5 + Math.random() * 8}px`,
                    background: WHEEL_COLORS[i % WHEEL_COLORS.length],
                    borderRadius: Math.random() > 0.5 ? "50%" : "2px",
                    animation: `confettiFall ${2 + Math.random() * 2}s ease-in forwards`,
                    animationDelay: `${Math.random() * 0.6}s`,
                    opacity: 0.9,
                  }} />
                ))}
              </div>
            )}

            {/* Winner overlay in centre of wheel */}
            {showOverlay && winner && !spinning && (
              <div
                onClick={() => setShowOverlay(false)}
                style={{
                  position: "absolute", top: 0, left: 0,
                  width: "100%", height: "100%",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  cursor: "pointer", zIndex: 20,
                }}
              >
                <div style={{
                  background: "rgba(255,255,255,0.96)",
                  borderRadius: "50%",
                  width: "78%", height: "78%",
                  display: "flex", flexDirection: "column",
                  alignItems: "center", justifyContent: "center",
                  border: `4px solid ${COLORS.gold}`,
                  boxShadow: `0 0 0 6px ${COLORS.maroon}, 0 8px 40px rgba(122,10,10,0.4)`,
                  animation: "overlayPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards",
                  textAlign: "center", padding: 16,
                }}>
                  <div style={{
                    fontSize: 13, color: COLORS.midMaroon,
                    fontFamily: "Calibri, 'Liberation Sans', sans-serif",
                    textTransform: "uppercase", letterSpacing: 3,
                    marginBottom: 4,
                  }}>Everybody listen to&hellip;</div>
                  <div style={{
                    fontSize: Math.min(38, 300 / Math.max(winner.length, 1)),
                    fontWeight: "bold", color: COLORS.maroon,
                    lineHeight: 1.2,
                  }}>
                    {winner}
                  </div>
                  <div style={{
                    fontSize: 11, color: COLORS.midMaroon,
                    fontFamily: "Calibri, sans-serif",
                    marginTop: 8, opacity: 0.7,
                  }}>click to dismiss</div>
                </div>
              </div>
            )}
          </div>

          {/* Spin button */}
          <button onClick={spinWheel} disabled={spinning || names.length < 2}
            style={{
              marginTop: 18,
              background: spinning
                ? COLORS.midMaroon
                : `linear-gradient(135deg, ${COLORS.maroon}, ${COLORS.stCatsRed})`,
              color: "#fff",
              border: `3px solid ${COLORS.gold}`,
              borderRadius: 50,
              padding: "13px 44px",
              fontSize: 19, fontWeight: "bold", fontFamily: "Georgia, serif",
              cursor: spinning || names.length < 2 ? "not-allowed" : "pointer",
              letterSpacing: 2, textTransform: "uppercase",
              boxShadow: spinning ? "none" : "0 4px 20px rgba(122,10,10,0.35)",
              transition: "all 0.3s ease",
              opacity: names.length < 2 ? 0.5 : 1,
              transform: spinning ? "scale(0.96)" : "scale(1)",
            }}>
            {spinning ? "Spinning…" : "🎯 Spin!"}
          </button>
        </div>
      </div>

      {/* GDPR footer */}
      <div style={{
        textAlign: "center", padding: "10px 16px",
        background: "rgba(255,255,255,0.7)", borderRadius: 8,
        maxWidth: 580, margin: "28px auto 0",
        fontFamily: "Calibri, 'Liberation Sans', sans-serif",
        fontSize: 11, color: COLORS.midMaroon,
        border: `1px solid ${COLORS.lightRose}`,
      }}>
        <strong style={{ color: COLORS.stCatsBlue }}>{"🔒"} GDPR Notice:</strong> This tool processes
        names entirely within your browser. No student data is collected, transmitted, or shared with
        any third party, and all names are erased when you close or refresh this page. Saved lists are
        only kept if you Export them to a file, which is stored on your own device — not online.
        Use first names only as best practice.
      </div>

      <style>{`
        @keyframes confettiFall {
          0% { transform: translateY(0) rotate(0deg); opacity: 1; }
          100% { transform: translateY(480px) rotate(720deg); opacity: 0; }
        }
        @keyframes overlayPop {
          0% { transform: scale(0.3); opacity: 0; }
          60% { transform: scale(1.05); opacity: 1; }
          100% { transform: scale(1); opacity: 1; }
        }
      `}</style>
    </div>
  );
}


    // Mount the component
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<NamePicker />);
  </script>
</body>
</html>
